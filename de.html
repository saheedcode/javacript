
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styled Counter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

  <div class="bg-white shadow-xl rounded-full flex items-center px-4 py-3 gap-6">

    <!-- Decrease Button -->
    <button id="decreaseBtn" onclick="decrease()" 
      class="bg-red-500 hover:bg-red-600 text-white w-10 h-10 rounded-full text-2xl flex items-center justify-center transition transform hover:scale-110">
      −
    </button>



    <!-- Counter (Middle) -->
    <span id="count" class="text-2xl font-bold w-10 text-center">0</span>

    <!-- Increase Button -->
    <button onclick="increase()" 
      class="bg-green-500 hover:bg-green-600 text-white w-10 h-10 rounded-full text-2xl flex items-center justify-center transition transform hover:scale-110">
      +
    </button>

  </div>







  

<script>
  let count = 0;

  function increase() {
    count++;
    document.getElementById("count").textContent = count;
  }

  function decrease() {
    if (count > 0) {
      count--;
      document.getElementById("count").textContent = count;
    }
  }
</script>

</body>
</html>
