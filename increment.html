
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Counter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gradient-to-br from-gray-900 to-gray-700">

  <!-- Container -->
  <div class="backdrop-blur-lg bg-white/10 border border-white/20 shadow-2xl rounded-full px-6 py-4 flex items-center gap-8">

    <!-- Decrease -->
    <button onclick="decrease()" 
      class="w-12 h-12 flex items-center justify-center rounded-full bg-white/20 text-white text-2xl font-bold hover:bg-red-500 transition-all duration-300 hover:scale-110 active:scale-95">
      −
    </button>

    <!-- Counter -->
    <span id="count" class="text-3xl font-bold text-white w-12 text-center tracking-wide">0</span>

    <!-- Increase -->
    <button onclick="increase()" 
      class="w-12 h-12 flex items-center justify-center rounded-full bg-white/20 text-white text-2xl font-bold hover:bg-green-500 transition-all duration-300 hover:scale-110 active:scale-95">
      +
    </button>

  </div>

<script>
  let count = 0;

  function increase() {
    count++;
    updateUI();
  }


  function decrease() {
  const display = document.getElementById("count");

  if (count > 0) {
    count--;
    display.textContent = count;

    // normal animation
    display.classList.add("scale-110");
    setTimeout(() => display.classList.remove("scale-110"), 150);

  } else {
    // feedback when trying to go below 0
    display.classList.add("text-red-400", "animate-pulse");

    setTimeout(() => {
      display.classList.remove("text-red-400", "animate-pulse");
    }, 300);
  }
}
  
  function updateUI() {
    const display = document.getElementById("count");
    display.textContent = count;

    // small animation effect
    display.classList.add("scale-125");
    setTimeout(() => {
      display.classList.remove("scale-125");
    }, 150);
  }
</script>

</body>
</html>
